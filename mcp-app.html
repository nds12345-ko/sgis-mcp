<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGIS 시도 통계지도</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
        color: #1f2933;
        background: #ffffff;
      }
      #bar {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        padding: 10px 14px;
        border-bottom: 1px solid #e4e7eb;
        background: #f8fafc;
      }
      #bar label { font-size: 13px; font-weight: 600; margin-right: 4px; }
      #bar select {
        padding: 5px 8px;
        font-size: 13px;
        border: 1px solid #cbd2d9;
        border-radius: 6px;
        background: #fff;
      }
      #title { font-size: 14px; font-weight: 700; margin-left: auto; color: #334e68; }
      #stage { position: relative; width: 100%; }
      svg { display: block; width: 100%; height: auto; background: #f0f4f8; }
      .region { stroke: #ffffff; stroke-width: 0.8; cursor: pointer; transition: opacity .1s; }
      .region:hover { opacity: 0.8; }
      #legend {
        position: absolute; right: 12px; bottom: 12px;
        background: rgba(255,255,255,0.95);
        border: 1px solid #e4e7eb; border-radius: 8px;
        padding: 8px 10px; font-size: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08);
      }
      #legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
      #legend .sw { width: 16px; height: 12px; border-radius: 2px; }
      #tip {
        position: absolute; pointer-events: none; display: none;
        background: #102a43; color: #fff; padding: 6px 9px; border-radius: 6px;
        font-size: 12px; transform: translate(-50%, -120%); white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0,0,0,.25);
      }
      #status { padding: 16px; font-size: 13px; color: #627d98; }
      #status.error { color: #b91c1c; }
    </style>
  </head>
  <body>
    <div id="bar">
      <span>
        <label for="stat">통계</label>
        <select id="stat">
          <option value="population">인구 (총인구)</option>
          <option value="household">가구 (가구 수)</option>
          <option value="house">주택 (주택 수)</option>
        </select>
      </span>
      <span>
        <label for="year">연도</label>
        <select id="year">
          <option value="2020">2020</option>
          <option value="2015">2015</option>
          <option value="2010">2010</option>
          <option value="2005">2005</option>
          <option value="2000">2000</option>
        </select>
      </span>
      <span id="title">시도 통계지도</span>
    </div>

    <div id="stage">
      <div id="status">지도를 불러오는 중…</div>
      <svg id="map" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid meet" hidden></svg>
      <div id="legend" hidden></div>
      <div id="tip"></div>
    </div>

    <script type="module" src="/src/mcp-app.ts"></script>
  </body>
</html>
