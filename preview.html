<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>SGIS 지도 미리보기 (개발용)</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: "Malgun Gothic", system-ui, sans-serif; color: #1f2933; }
      #bar { display: flex; gap: 12px; align-items: center; padding: 10px 14px;
        border-bottom: 1px solid #e4e7eb; background: #f8fafc; }
      #title { font-size: 14px; font-weight: 700; margin-left: auto; color: #334e68; }
      #stage { position: relative; width: 100%; max-width: 820px; }
      svg { display: block; width: 100%; height: auto; background: #f0f4f8; }
      .region { stroke: #ffffff; stroke-width: 0.8; cursor: pointer; }
      .region:hover { opacity: 0.8; }
      #legend { position: absolute; right: 12px; bottom: 12px; background: rgba(255,255,255,.95);
        border: 1px solid #e4e7eb; border-radius: 8px; padding: 8px 10px; font-size: 12px; }
      #legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
      #legend .sw { width: 16px; height: 12px; border-radius: 2px; }
      #tip { position: absolute; pointer-events: none; display: none; background: #102a43;
        color: #fff; padding: 6px 9px; border-radius: 6px; font-size: 12px;
        transform: translate(-50%, -120%); white-space: nowrap; }
    </style>
  </head>
  <body>
    <div id="bar"><strong>개발용 미리보기</strong><span id="title">시도 통계지도</span></div>
    <div id="stage">
      <svg id="map" viewBox="0 0 800 900" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="legend"></div>
      <div id="tip"></div>
    </div>
    <script type="module" src="/src/preview.ts"></script>
  </body>
</html>
